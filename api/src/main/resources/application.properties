spring.application.name=guzmanges-api

# === Servidor ===
server.port=8080

# === DataSource MySQL ===
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:guzmanges}?useSSL=false&connectionTimeZone=LOCAL&forceConnectionTimeZoneToSession=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# === JPA / Hibernate ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# === JWT ===
guzmanges.jwt.secret=${JWT_SECRET:CAMBIA_ESTE_SECRETO_POR_UNHA_CADEA_LONGA_E_ALEATORIA_DE_ALOMENOS_64_CARACTERES_PARA_PRODUCION}
guzmanges.jwt.expiration-ms=86400000

# === Fiscalidad ===
# Palabra clave (sin distinguir mayúsculas/minúsculas) que el ClienteMapper busca
# en el nombre de la posición fiscal del cliente para deducir si está sujeto al
# régimen de recargo de equivalencia. Si Odoo cambia el nombre de la posición
# fiscal en el futuro, basta con actualizar esta clave (o configurar la variable
# de entorno) sin tocar el código de la app ni recompilar nada.
app.posicion-fiscal.recargo-keyword=${POSICION_FISCAL_RECARGO_KEYWORD:recargo}

# === CORS ===
# Orígenes permitidos separados por comas. Admite patrones con comodín (*).
# En producción, sustituir por el dominio real del frontend.
guzmanges.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:*}

# === Odoo ===
# Conexión a la instancia de Odoo (definir como variables de entorno).
odoo.url=${ODOO_URL}
odoo.database=${ODOO_DB}
odoo.username=${ODOO_USER}
odoo.apikey=${ODOO_APIKEY}
# Idioma para leer los campos traducibles de Odoo (nombres de catálogos, etc.).
odoo.lang=${ODOO_LANG:es_ES}
# Sincronización: activable/desactivable e intervalos (ms). 900000=15min, 3600000=1h.
odoo.sync.enabled=${ODOO_SYNC_ENABLED:true}
odoo.sync.clientes.interval=900000
odoo.sync.maestros.interval=3600000